name: Contribution Tracker

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Run contribution tracker
        env:
          START_DATE: "2026-03-31"
          DAILY_TARGET: 50
          USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }} # use PAT (recommended)
        run: |
          python3 <<EOF
          import os
          import datetime
          import requests
          import json
          import sys

          # --- Config ---
          start_date = datetime.datetime.strptime(os.environ["START_DATE"], "%Y-%m-%d").date()
          today = datetime.date.today()
          daily_target = int(os.environ["DAILY_TARGET"])
          username = os.environ["USERNAME"]
          token = os.environ.get("GITHUB_TOKEN")

          # --- Calculate expected ---
          days_passed = (today - start_date).days + 1
          expected_total = days_passed * daily_target

          print(f"📅 Days passed: {days_passed}")
          print(f"🎯 Expected total contributions: {expected_total}")

          # --- GraphQL query ---
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/json"
          }

          query = """
          query($userName:String!) {
            user(login: $userName) {
              contributionsCollection {
                contributionCalendar {
                  totalContributions
                }
              }
            }
          }
          """

          response = requests.post(
              "https://api.github.com/graphql",
              json={"query": query, "variables": {"userName": username}},
              headers=headers,
          )

          data = response.json()

          # --- Error handling ---
          if "data" not in data:
              print("❌ GitHub API error:")
              print(json.dumps(data, indent=2))
              sys.exit(1)

          if data["data"]["user"] is None:
              print("❌ User not found or token has no access.")
              sys.exit(1)

          actual_total = data["data"]["user"]["contributionsCollection"]["contributionCalendar"]["totalContributions"]

          print(f"📊 Actual contributions: {actual_total}")

          # --- Calculate remaining ---
          remaining = expected_total - actual_total
          today_target = daily_target

          print(f"📉 Remaining contributions to stay on track: {remaining}")
          print(f"📅 Today's target: {today_target}")

          if remaining > 0:
              print(f"⚠️ You need at least {today_target} contributions today to stay on track.")
          else:
              print("✅ You're on track or ahead 🎉")

          EOF
